pre-commit:
  commands:
    no-resolved-paths:
      glob: "{agents/*.md,skills/**/*.md}"
      run: |
        for file in {staged_files}; do
          if grep -qF "$HOME/brain/learning-loop" "$file" 2>/dev/null || \
             grep -qF "~/brain/learning-loop" "$file" 2>/dev/null || \
             grep -qF "$HOME/brain/brain" "$file" 2>/dev/null || \
             grep -qF "~/brain/brain" "$file" 2>/dev/null; then
            echo "ERROR: $file contains resolved paths — use {{PLUGIN}} or {{VAULT}} tokens"
            exit 1
          fi
        done
